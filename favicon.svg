<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff41"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0e27" rx="8"/>
  
  <!-- Terminal window -->
  <rect x="6" y="10" width="52" height="44" fill="#1a2332" rx="3" stroke="#00d9ff" stroke-width="1"/>
  
  <!-- Header dots -->
  <circle cx="12" cy="16" r="1.5" fill="#ff5f56"/>
  <circle cx="18" cy="16" r="1.5" fill="#ffbd2e"/>
  <circle cx="24" cy="16" r="1.5" fill="#27c93f"/>
  
  <!-- Code lines -->
  <line x1="10" y1="24" x2="28" y2="24" stroke="#00ff41" stroke-width="2"/>
  <line x1="32" y1="24" x2="48" y2="24" stroke="#00d9ff" stroke-width="2"/>
  
  <line x1="10" y1="30" x2="22" y2="30" stroke="#00d9ff" stroke-width="2"/>
  <line x1="26" y1="30" x2="45" y2="30" stroke="#8b5cf6" stroke-width="2"/>
  
  <line x1="10" y1="36" x2="35" y2="36" stroke="#00ff41" stroke-width="2"/>
  <line x1="39" y1="36" x2="50" y2="36" stroke="#00d9ff" stroke-width="2"/>
  
  <line x1="10" y1="42" x2="25" y2="42" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="29" y1="42" x2="48" y2="42" stroke="#00ff41" stroke-width="2"/>
  
  <!-- Blinking cursor -->
  <rect x="10" y="47" width="6" height="2" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
